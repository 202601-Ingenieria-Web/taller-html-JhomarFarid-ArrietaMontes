<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeDex</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-brand">
        <img src="img/pokeball.png" alt="Pokébola" class="pokeball-img" />
        <h1 class="site-title" id="site-title" style="cursor: pointer">
          PokéDex
        </h1>
      </div>
      <div>
        <p class="site-subtitle">Explora el mundo de los Pokémon</p>
      </div>
    </header>

    <main class="main-content">
      <section class="search-section" aria-label="Buscar pokémon">
        <div class="search-wrapper">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Busca por nombre o número"
            autocomplete="off"
            aria-label="Buscar Pokémon por nombre o número "
          />
          <button
            id="search-btn"
            class="search-btn"
            aria-label="Ejecutar búsqueda"
            title="Buscar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <button
            id="reset-btn"
            class="reset-btn"
            aria-label="Ver todos los pokémon"
            title="Ver todos"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-4.5" />
            </svg>
          </button>
        </div>
        <p
          id="status-msg"
          class="status-msg"
          role="status"
          aria-live="polite"
        ></p>
      </section>
      <section class="pokemon-grid-section" aria-label="Lista de pokémon">
        <div id="pokemon-grid" class="pokemon-grid"></div>
        <nav
          id="pagination"
          class="pagination"
          aria-label="Paginación de pokémon"
        >
          <button
            id="prev-btn"
            class="page-btn"
            aria-label="Página anterior"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>

          <div id="page-numbers" class="page-numbers"></div>

          <button id="next-btn" class="page-btn" aria-label="Página siguiente">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </nav>
      </section>
    </main>

    <div
      id="modal-overlay"
      class="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-name"
      hidden
    >
      <article class="modal-card">
        <button
          id="modal-close"
          class="modal-close"
          aria-label="Cerrar detalle"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>

        <!-- Sección superior: imagen + nombre + tipos -->
        <div class="modal-hero">
          <div class="modal-img-wrapper">
            <img id="modal-img" class="modal-img" src="" alt="" />
          </div>
          <div class="modal-identity">
            <span id="modal-id" class="modal-id"></span>
            <h2 id="modal-name" class="modal-name"></h2>
            <!-- Badges de tipos -->
            <div id="modal-types" class="modal-types"></div>
          </div>
        </div>

        <div class="modal-meta">
          <div class="meta-item">
            <span class="meta-label">Altura</span>
            <span id="modal-height" class="meta-value"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Peso</span>
            <span id="modal-weight" class="meta-value"></span>
          </div>
          <div class="meta-item meta-abilities">
            <span class="meta-label">Habilidades</span>
            <span id="modal-abilities" class="meta-value"></span>
          </div>
        </div>

        <div class="modal-stats">
          <h3 class="stats-title">Estadísticas base</h3>
          <!-- Las barras se generan dinámicamente en app.js -->
          <ul id="modal-stats-list" class="stats-list"></ul>
        </div>
      </article>
    </div>

    <footer class="site-footer">
      <p>
        Datos obtenidos desde
        <a href="https://pokeapi.co" target="_blank" rel="noopener">PokéAPI</a>
        · Taller Ingeniería Web 2026
      </p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
